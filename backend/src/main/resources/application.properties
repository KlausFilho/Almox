# Em produção (Render), essas variáveis vêm do ambiente.
# Em desenvolvimento local, ele usa os valores padrão depois do ":" abaixo.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/almoxarifado}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

server.port=${PORT:8080}
