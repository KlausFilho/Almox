<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToolTrack — Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon">🔧</div>
    <div>
      <div class="brand-text">ToolTrack</div>
      <div class="brand-sub">Controle de Ferramentas</div>
    </div>
  </div>
  <nav class="sidebar-nav">
    <a href="index.html"          class="nav-link" data-page="dashboard"><span class="icon">⊞</span> Dashboard</a>
    <a href="ferramentas.html"    class="nav-link" data-page="ferramentas"><span class="icon">🔩</span> Ferramentas</a>
    <a href="movimentacoes.html"  class="nav-link" data-page="movimentacoes"><span class="icon">↔</span> Movimentações</a>
    <a href="funcionarios.html"   class="nav-link" data-page="funcionarios"><span class="icon">👤</span> Funcionários</a>
    <a href="historico.html"      class="nav-link" data-page="historico"><span class="icon">📋</span> Histórico</a>
  </nav>
</aside>
<div class="sidebar-overlay"></div>

<div class="main">
  <div class="topbar">
    <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Abrir menu">☰</button>
    <div class="search-box">
      <span>🔍</span>
      <input type="text" placeholder="Buscar ferramentas, funcionários..." />
    </div>
  </div>

  <div class="page-content">
    <div class="page-header">
      <div class="page-title">Dashboard</div>
      <div class="page-sub">Visão geral do controle de ferramentas</div>
    </div>

    <div class="cards-grid" id="cards">
      <div class="loading">Carregando...</div>
    </div>

    <div class="grid-2col" style="grid-template-columns:1fr 380px; gap:20px; margin-top:8px;">
      <!-- Gráfico de movimentações por dia -->
      <div class="table-card">
        <div class="table-header">
          <span class="table-title">Ferramentas por Status</span>
        </div>
        <div style="padding:24px;" id="status-chart">
          <div class="loading">Carregando...</div>
        </div>
      </div>

      <!-- Últimas movimentações -->
      <div class="table-card">
        <div class="table-header">
          <span class="table-title">Últimas Movimentações</span>
          <a href="historico.html" class="btn btn-ghost btn-sm">Ver todas</a>
        </div>
        <div id="ultimas-lista">
          <div class="loading">Carregando...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="api.js"></script>
<script>
activateNav('dashboard');

async function loadDashboard() {
  try {
    const d = await api.dashboard.resumo();

    document.getElementById('cards').innerHTML = `
      <div class="stat-card">
        <div class="info">
          <span class="stat-label">Disponíveis</span>
          <span class="stat-value">${d.ferramentasDisponiveis}</span>
        </div>
        <div class="stat-icon icon-green">📦</div>
      </div>
      <div class="stat-card">
        <div class="info">
          <span class="stat-label">Em Uso</span>
          <span class="stat-value">${d.ferramentasEmUso}</span>
        </div>
        <div class="stat-icon icon-yellow">🔧</div>
      </div>
      <div class="stat-card">
        <div class="info">
          <span class="stat-label">Funcionários</span>
          <span class="stat-value">${d.totalFuncionarios}</span>
        </div>
        <div class="stat-icon icon-purple">👥</div>
      </div>
      <div class="stat-card">
        <div class="info">
          <span class="stat-label">Movim. Hoje</span>
          <span class="stat-value">${d.movimentacoesHoje}</span>
        </div>
        <div class="stat-icon icon-red">📈</div>
      </div>
    `;

    // Barras de status
    const total = d.totalFerramentas || 1;
    const pctDisp = Math.round((d.ferramentasDisponiveis / total) * 100);
    const pctUso  = Math.round((d.ferramentasEmUso       / total) * 100);

    document.getElementById('status-chart').innerHTML = `
      <div style="margin-bottom:20px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
          <span style="font-size:13px;color:var(--muted);font-weight:600;">Disponíveis</span>
          <span style="font-family:'DM Mono',monospace;font-size:13px;">${d.ferramentasDisponiveis} / ${total}</span>
        </div>
        <div style="background:var(--bg);border-radius:8px;height:12px;overflow:hidden;">
          <div style="background:var(--accent2);height:100%;width:${pctDisp}%;border-radius:8px;transition:width 0.6s;"></div>
        </div>
      </div>
      <div>
        <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
          <span style="font-size:13px;color:var(--muted);font-weight:600;">Em Uso</span>
          <span style="font-family:'DM Mono',monospace;font-size:13px;">${d.ferramentasEmUso} / ${total}</span>
        </div>
        <div style="background:var(--bg);border-radius:8px;height:12px;overflow:hidden;">
          <div style="background:var(--accent);height:100%;width:${pctUso}%;border-radius:8px;transition:width 0.6s;"></div>
        </div>
      </div>
      <div style="margin-top:28px;font-size:12px;color:var(--muted);text-align:center;">
        Total de ferramentas cadastradas: <strong style="color:var(--text)">${total}</strong>
      </div>
    `;

    // Últimas movimentações
    const movs = d.ultimasMovimentacoes || [];
    if (movs.length === 0) {
      document.getElementById('ultimas-lista').innerHTML = `<div class="empty"><div class="empty-icon">📋</div><div class="empty-sub">Nenhuma movimentação ainda</div></div>`;
    } else {
      document.getElementById('ultimas-lista').innerHTML = movs.map(m => `
        <div style="display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border);">
          <div style="width:36px;height:36px;border-radius:8px;background:${m.tipo==='RETIRADA'?'#3d1a1a':'#1a3d2e'};display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">
            ${m.tipo === 'RETIRADA' ? '↗' : '↙'}
          </div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${m.ferramenta}</div>
            <div style="font-size:12px;color:var(--muted);">${m.funcionario}</div>
          </div>
          <div style="text-align:right;flex-shrink:0;">
            <span class="badge ${m.tipo==='RETIRADA'?'badge-red':'badge-green'}">${m.tipo}</span>
            <div style="font-size:11px;color:var(--muted);margin-top:4px;font-family:'DM Mono',monospace;">${formatDate(m.dataHora)}</div>
          </div>
        </div>
      `).join('');
    }

  } catch (e) {
    document.getElementById('cards').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Erro ao carregar dados</div><div class="empty-sub">Verifique se o backend está rodando em localhost:8080</div></div>`;
  }
}

loadDashboard();
</script>
</body>
</html>
